pack_name = "glossary"
pack_description = "Click-to-explain hotspots for common technical terms"

# Glossary pack: when a known technical term appears in terminal output, the
# word becomes a hotspot. Clicking it emits a `hotspot.explain` event carrying
# the matched term and up to 200 characters of surrounding context. External
# consumers — a tooltip overlay, the bundled glossary-lookup.sh hook, a chat
# notifier — subscribe to that event and surface the definition however they
# like.
#
# How to configure the terms file path:
#   Add the following to your therminal.toml:
#
#     [patterns.glossary]
#     terms_file = "~/.config/therminal/glossary.terms.toml"
#
#   The shipped default terms live in plugins/examples/data/glossary.terms.toml.
#   Copy that file to the path above and edit it to add or remove terms.
#   Each term becomes one pattern entry below — regenerate with:
#
#     therminal semantic patterns rebuild glossary
#
# Two patterns per term (§2.3 "one pattern, one action"):
#   - A `hotspot` pattern makes the word clickable and records the context.
#   - A paired `emit_event` pattern publishes the same data to the event bus
#     so orchestrators can subscribe without the GUI needing to be focused.

# ── monad ────────────────────────────────────────────────────────────────────

[[pattern]]
name = "hotspot-monad"
description = "Clickable hotspot for the term 'monad'"
match = '\b(?P<term>[Mm]onad)\b(?P<ctx>.{0,200})'
scope = "finalized_line"
action = "hotspot"

[pattern.hotspot]
on_click = "emit_event"
label = "Explain: {term}"
kind = "hotspot.explain"
highlight = "term"

[[pattern]]
name = "event-monad"
description = "Emit explain event for the term 'monad'"
match = '\b(?P<term>[Mm]onad)\b(?P<ctx>.{0,200})'
scope = "finalized_line"
action = "emit_event"

[pattern.emit_event]
extra.term = "{term}"
extra.ctx = "{ctx}"
extra.definition = "A design pattern from functional programming that wraps a value in a context (e.g., Maybe, IO, Future) and provides bind/flatMap for chaining operations."

